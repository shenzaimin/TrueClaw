name: TrueClaw CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  verify:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run unit tests (stream tool_calls parser)
        run: |
          export PYTHONPATH=src
          python3 -m unittest tests/test_stream_parser.py
          python3 -m unittest tests/test_mcp_mock.py
          python3 -m unittest tests/test_scheduler_leader.py
          python3 -m unittest tests/test_gateway_subscribe.py

      - name: Run integration verify (L1+L2)
        run: bash scripts/ci-verify.sh

      - name: Gateway smoke only (regression)
        run: |
          export PYTHONPATH=src
          python3 -m trueclaw --config ./trueclaw.local.json gateway smoke
